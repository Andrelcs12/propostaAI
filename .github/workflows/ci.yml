name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      WEB_URL: http://localhost:3000
      API_URL: http://localhost:3333
      NEXT_PUBLIC_API_URL: http://localhost:3333
      DATABASE_URL: postgresql://postgres:postgres@localhost:5438/proposta_ai_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5438/proposta_ai_ci
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-safe-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-safe-placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-safe-placeholder
      STRIPE_SECRET_KEY: ""
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
